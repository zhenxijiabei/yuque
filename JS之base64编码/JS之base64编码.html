<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Base64 Encoding Example</title>
  <script src="base64.js"></script>
</head>
<body>
  <h1>Base64 Encoding Example</h1>
  
  <script>
    // 原始的包含非拉丁字符的字符串
    var originalText = "你好，世界！"; // 包含非拉丁字符

    // 使用 TextEncoder 进行编码
    var encoder = new TextEncoder();
    var data = encoder.encode(originalText);

    // 使用 Base64.js 进行 Base64 编码
    var base64Encoded = Base64.encode(data);

    // 将编码后的结果显示在控制台
    console.log("Original Text:", originalText);
    console.log("Base64 Encoded:", base64Encoded);
  </script>
</body>
</html>
